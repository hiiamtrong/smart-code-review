name: Bump version
on:
  push:
    branches:
      - main
permissions:
  contents: write
  pull-requests: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
      - name: Enforce conventional commits
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          # Skip lint for bot commits ([skip ci]) and GitHub merge commits
          if echo "$COMMIT_MSG" | grep -qE "^\[skip ci\]|\[skip ci\]$|^Merge pull request|^Merge branch"; then
            echo "Skipping lint for: $COMMIT_MSG"
            exit 0
          fi
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?(!)?: .+'
          if ! echo "$COMMIT_MSG" | grep -qE "$PATTERN"; then
            echo "ERROR: Commit message does not follow Conventional Commits format"
            echo "Message: $COMMIT_MSG"
            echo ""
            echo "Expected: type(scope)?: description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert"
            echo ""
            echo "Version bump rules:"
            echo "  feat:  -> minor (1.x.0)"
            echo "  fix:   -> patch (1.0.x)"
            echo "  feat!: or BREAKING CHANGE -> major (x.0.0)"
            echo "  others -> patch (1.0.x)"
            exit 1
          fi
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
      - name: Update VERSION file
        if: steps.tag_version.outputs.new_version != ''
        env:
          NEW_VERSION: ${{ steps.tag_version.outputs.new_version }}
        run: |
          echo "${NEW_VERSION}" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --staged --quiet || git commit -m "chore: sync VERSION to ${NEW_VERSION} [skip ci]"
          git push
      - name: Fetch tags and checkout tagged commit for GoReleaser
        if: steps.tag_version.outputs.new_tag != ''
        run: |
          git fetch --tags
          git checkout ${{ steps.tag_version.outputs.new_tag }}
      - name: Set up Go
        if: steps.tag_version.outputs.new_tag != ''
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - name: Run GoReleaser
        if: steps.tag_version.outputs.new_tag != ''
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
