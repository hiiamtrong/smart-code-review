name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'chore/**', 'refactor/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Unit tests + build on all three platforms ─────────────────────────────
  test:
    name: Test · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Download modules
        working-directory: go
        run: go mod download

      - name: Vet
        working-directory: go
        run: go vet ./...

      - name: Unit tests (with race detector)
        working-directory: go
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: go/coverage.out
          retention-days: 7

      - name: Build binary (Linux / macOS)
        if: runner.os != 'Windows'
        working-directory: go
        run: go build -o ai-review ./cmd/ai-review

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        working-directory: go
        run: go build -o ai-review.exe ./cmd/ai-review

  # ── E2E tests — Linux & macOS only ────────────────────────────────────────
  # Windows is excluded because the fake sonar-scanner helper uses a POSIX
  # shell script (#!/bin/sh) that cannot be executed natively on Windows.
  e2e:
    name: E2E · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Download modules
        working-directory: go
        run: go mod download

      - name: E2E tests
        working-directory: go
        run: go test -tags=e2e -v -timeout 120s ./e2e/

  # ── Coverage gate (runs after unit tests on Linux) ─────────────────────────
  coverage:
    name: Coverage gate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Run tests with coverage
        working-directory: go
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Check coverage threshold (80%)
        working-directory: go
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < 80)}"; then
            echo "ERROR: Coverage ${COVERAGE}% is below 80% threshold"
            exit 1
          fi
          echo "OK: Coverage ${COVERAGE}% meets the 80% threshold"
